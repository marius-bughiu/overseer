name: 🐛 Bug report
description: Report a problem with Overseer
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill out the details below.
        For security vulnerabilities, do **not** use this form — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I click Connect on a Windows machine over RDP, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
    validations:
      required: true
  - type: dropdown
    id: discovery
    attributes:
      label: Discovery method
      options:
        - Tailscale API
        - Local CLI
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Overseer version
      placeholder: v0.1.0 (or commit SHA)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or attach screenshots. Redact secrets!
    validations:
      required: false
